<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTodo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">MyTodo</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <li class="nav-item">
          <a class="nav-link active" href="/">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li>

      </ul>

      <form class="d-flex">
        <input class="form-control me-2" type="search" placeholder="Search">
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>

    </div>
  </div>
</nav>

<div class="container">
  <h1>Add a Todo!</h1>
  <form action="/" method="POST">
    <div class="mb-3">
      <label for="title" class="form-label">Enter your Task</label>
      <input type="text" class="form-control" name="title" id="title">
    </div>
    <div class="mb-3">
      <label for="desc" class="form-label">Describe your Task</label>
      <input type="text" class="form-control" name="desc" id="desc">
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
  </form>
</div>

<div class="container my-4">
  <h1>Your Todos</h1>

  {% if alltodo|length == 0 %}
    <p>No todos yet...</p>
  {% endif %}

  {% for todo in alltodo %}
    <div class="todo-card">
        <h3>{{ todo.title }}</h3>
        <p>{{ todo.desc }}</p>
        <small>{{ todo.timestamp|timeago }}</small>

        <div class="actions mt-2">
            <a href="/update/{{todo.sno}}" class="btn btn-outline-dark btn-sm mx-1">Update</a>

            <a href="/delete/{{todo.sno}}" class="btn btn-danger btn-sm mx-1" onclick="return confirmDelete()">Delete</a>
        </div>
    </div>
  {% endfor %}
</div>

<footer class="text-center mt-5 py-3" style="background-color: #f8f9fa;">
</footer>

<script src="{{ url_for('static', filename='test.js') }}"></script>
</body>
</html>
